version: "3.9"

services:
  evolution_api:
    image: atendai/evolution-api:v2.2.2 # pin to a version tag for stability
    container_name: evolution_api
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_TOKEN}"   # strong secret
    expose:
      - "8080"  # internal only; nginx fronts it
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:stable-alpine
    container_name: evolution_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro            # place your cert/key here or mount certbot volume
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - evolution_api
    networks:
      - backend
      - frontend

networks:
  backend:
    internal: true
  frontend:
    external: false
