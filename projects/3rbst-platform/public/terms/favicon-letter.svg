<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle inner shadow for depth -->
    <filter id="innerShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" flood-color="rgba(0,0,0,0.1)" stdDeviation="1"/>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="url(#letterGradient)" filter="url(#innerShadow)"/>
  
  <!-- Arabic letter ع (Ayn) - carefully positioned and sized -->
  <text x="32" y="44" 
        font-family="Cairo, Amiri, Noto Sans Arabic, Arial" 
        font-size="28" 
        font-weight="700" 
        text-anchor="middle" 
        fill="white"
        opacity="0.95">ع</text>
</svg>