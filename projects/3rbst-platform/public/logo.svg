<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded rectangle -->
  <rect x="5" y="5" width="50" height="50" rx="12" ry="12" fill="url(#gradient)" />
  
  <!-- Document icon -->
  <rect x="15" y="15" width="20" height="25" rx="2" ry="2" fill="white" opacity="0.9"/>
  <rect x="25" y="20" width="8" height="2" rx="1" fill="url(#gradient)" opacity="0.7"/>
  <rect x="25" y="25" width="6" height="1.5" rx="0.5" fill="url(#gradient)" opacity="0.7"/>
  <rect x="25" y="29" width="8" height="1.5" rx="0.5" fill="url(#gradient)" opacity="0.7"/>
  <rect x="25" y="33" width="4" height="1.5" rx="0.5" fill="url(#gradient)" opacity="0.7"/>
  
  <!-- Arabic-style decorative element -->
  <circle cx="40" cy="20" r="3" fill="white" opacity="0.8"/>
  <circle cx="40" cy="35" r="2" fill="white" opacity="0.6"/>
  
  <!-- Text "3rbst" -->
  <text x="70" y="38" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">3rbst</text>
  
  <!-- Subtle tagline -->
  <text x="70" y="50" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#6b7280">Smart Document Analysis</text>
</svg>