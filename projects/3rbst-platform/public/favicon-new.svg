<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main rounded square background -->
  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="url(#faviconGradient)" />
  
  <!-- Document representation -->
  <rect x="16" y="14" width="24" height="32" rx="3" ry="3" fill="white" opacity="0.95"/>
  
  <!-- Document lines suggesting text -->
  <rect x="20" y="20" width="16" height="3" rx="1.5" fill="url(#faviconGradient)" opacity="0.7"/>
  <rect x="20" y="26" width="12" height="2.5" rx="1.25" fill="url(#faviconGradient)" opacity="0.7"/>
  <rect x="20" y="31" width="16" height="2.5" rx="1.25" fill="url(#faviconGradient)" opacity="0.7"/>
  <rect x="20" y="36" width="10" height="2.5" rx="1.25" fill="url(#faviconGradient)" opacity="0.7"/>
  
  <!-- Arabic-inspired geometric element in corner -->
  <circle cx="44" cy="20" r="4" fill="white" opacity="0.8"/>
  <circle cx="44" cy="20" r="2" fill="url(#faviconGradient)" opacity="0.6"/>
</svg>