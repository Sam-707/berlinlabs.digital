<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 50" width="180" height="50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" flood-color="rgba(16, 185, 129, 0.2)" stdDeviation="1"/>
    </filter>
  </defs>
  
  <!-- Letter badge -->
  <rect x="5" y="5" width="40" height="40" rx="10" ry="10" fill="url(#logoGradient)" filter="url(#logoShadow)"/>
  
  <!-- Arabic letter ع -->
  <text x="25" y="32" 
        font-family="Cairo, Amiri, Noto Sans Arabic, Arial" 
        font-size="20" 
        font-weight="700" 
        text-anchor="middle" 
        fill="white">ع</text>
  
  <!-- Company name "3rbst" -->
  <text x="60" y="32" 
        font-family="Inter, system-ui, sans-serif" 
        font-size="24" 
        font-weight="800" 
        fill="#1f2937"
        letter-spacing="-0.5px">3rbst</text>
</svg>