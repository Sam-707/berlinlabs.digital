<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Green gradient matching the logo -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" flood-color="rgba(0,0,0,0.15)" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Rounded square background matching the logo -->
  <rect x="4" y="4" width="56" height="56" rx="12" ry="12" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- Number "3" in white, bold and centered -->
  <text x="32" y="44" 
        font-family="Inter, system-ui, sans-serif" 
        font-size="32" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="white">3</text>
</svg>