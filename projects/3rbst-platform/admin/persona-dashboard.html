<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rbst - Persona Analysis Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .stat-change {
            font-size: 0.9rem;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .stat-change.positive {
            background: #d4edda;
            color: #155724;
        }

        .stat-change.negative {
            background: #f8d7da;
            color: #721c24;
        }

        .charts-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .chart-title {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }

        .persona-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .persona-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .persona-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .persona-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .power-user { background: #e74c3c; }
        .premium-subscriber { background: #9b59b6; }
        .trial-user { background: #f39c12; }
        .occasional-user { background: #3498db; }
        .at-risk-user { background: #e67e22; }
        .document-specialist { background: #27ae60; }

        .persona-name {
            font-size: 1.2rem;
            color: #2c3e50;
            font-weight: bold;
        }

        .persona-count {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .persona-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .metric {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .metric-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .metric-label {
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        .insights-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .insights-title {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .insight-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid;
        }

        .insight-high { 
            background: #fff5f5; 
            border-color: #e74c3c; 
        }

        .insight-medium { 
            background: #fffaf0; 
            border-color: #f39c12; 
        }

        .insight-positive { 
            background: #f0fff4; 
            border-color: #27ae60; 
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .control-group input, .control-group select {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
        }

        .refresh-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .refresh-btn:hover {
            background: #229954;
        }

        .export-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            
            .persona-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>🎭 Persona Analysis Dashboard</h1>
            <p>Advanced user behavior insights and segmentation for 3rbst.com</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Phone Number (Individual Analysis)</label>
                <input type="text" id="phoneInput" placeholder="+49176..." />
            </div>
            <button class="refresh-btn" onclick="refreshDashboard()">🔄 Refresh Data</button>
            <button class="export-btn" onclick="exportData()">📊 Export Report</button>
        </div>

        <div class="stats-grid" id="statsGrid">
            <div class="loading">Loading dashboard data...</div>
        </div>

        <div class="charts-container" id="chartsContainer" style="display: none;">
            <div class="chart-card">
                <div class="chart-title">Persona Distribution</div>
                <canvas id="personaChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">Document Categories</div>
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="persona-grid" id="personaGrid" style="display: none;">
            <!-- Persona cards will be dynamically generated -->
        </div>

        <div class="insights-container" id="insightsContainer" style="display: none;">
            <div class="insights-title">💡 Business Insights & Recommendations</div>
            <div id="insightsList">
                <!-- Insights will be dynamically generated -->
            </div>
        </div>
    </div>

    <script>
        let dashboardData = null;
        let personaChart = null;
        let categoryChart = null;

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            refreshDashboard();
            
            // Add event listener for individual analysis
            document.getElementById('phoneInput').addEventListener('change', function() {
                const phoneNumber = this.value;
                if (phoneNumber) {
                    analyzeIndividualUser(phoneNumber);
                }
            });
        });

        async function refreshDashboard() {
            try {
                showLoading();
                
                // Fetch all dashboard data in parallel
                const [distribution, insights, patterns] = await Promise.all([
                    fetchPersonaDistribution(),
                    fetchSegmentInsights(),
                    fetchBehavioralPatterns()
                ]);

                dashboardData = { distribution, insights, patterns };
                
                renderStatsCards(distribution, insights);
                renderCharts(distribution);
                renderPersonaCards(distribution, insights);
                renderInsights(insights);
                
                hideLoading();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                showError('Failed to load dashboard data: ' + error.message);
            }
        }

        async function fetchPersonaDistribution() {
            const response = await fetch('/api/persona-analysis?action=persona-distribution');
            if (!response.ok) throw new Error('Failed to fetch persona distribution');
            const data = await response.json();
            return data.data;
        }

        async function fetchSegmentInsights() {
            const response = await fetch('/api/persona-analysis?action=segment-insights');
            if (!response.ok) throw new Error('Failed to fetch segment insights');
            const data = await response.json();
            return data.data;
        }

        async function fetchBehavioralPatterns() {
            const response = await fetch('/api/persona-analysis?action=behavioral-patterns');
            if (!response.ok) throw new Error('Failed to fetch behavioral patterns');
            const data = await response.json();
            return data.data;
        }

        async function analyzeIndividualUser(phoneNumber) {
            try {
                const response = await fetch(`/api/persona-analysis?action=analyze&phoneNumber=${encodeURIComponent(phoneNumber)}`);
                if (!response.ok) throw new Error('User not found or analysis failed');
                
                const data = await response.json();
                showIndividualAnalysis(data.data);
                
            } catch (error) {
                alert('Error analyzing user: ' + error.message);
            }
        }

        function renderStatsCards(distribution, insights) {
            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-value">${distribution.totalUsers}</div>
                    <div class="stat-label">Total Users</div>
                    <div class="stat-change positive">+${insights.segments.newUsers.count} new this week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">€${distribution.totalRevenue}</div>
                    <div class="stat-label">Total Revenue</div>
                    <div class="stat-change positive">€${distribution.averageRevenuePerUser} ARPU</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${insights.segments.active.count}</div>
                    <div class="stat-label">Active Users</div>
                    <div class="stat-change positive">${insights.segments.active.avgDocuments} docs/user</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${insights.segments.atRisk.count}</div>
                    <div class="stat-label">At-Risk Users</div>
                    <div class="stat-change negative">Avg ${insights.segments.atRisk.avgInactivityDays} days inactive</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${insights.behaviorInsights.errorRate}%</div>
                    <div class="stat-label">Error Rate</div>
                    <div class="stat-change ${insights.behaviorInsights.errorRate < 5 ? 'positive' : 'negative'}">
                        ${insights.behaviorInsights.totalEvents} total events
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${insights.segments.newUsers.conversionRate}%</div>
                    <div class="stat-label">Conversion Rate</div>
                    <div class="stat-change positive">New user to paid</div>
                </div>
            `;
            
            document.getElementById('statsGrid').innerHTML = statsHTML;
        }

        function renderCharts(distribution) {
            // Persona Distribution Chart
            const ctx1 = document.getElementById('personaChart').getContext('2d');
            if (personaChart) personaChart.destroy();
            
            personaChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(distribution.personaDistribution),
                    datasets: [{
                        data: Object.values(distribution.personaDistribution),
                        backgroundColor: [
                            '#e74c3c', '#9b59b6', '#f39c12', 
                            '#3498db', '#e67e22', '#27ae60'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Document Categories Chart
            const ctx2 = document.getElementById('categoryChart').getContext('2d');
            if (categoryChart) categoryChart.destroy();
            
            categoryChart = new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: Object.keys(distribution.documentCategoryDistribution),
                    datasets: [{
                        label: 'Documents',
                        data: Object.values(distribution.documentCategoryDistribution),
                        backgroundColor: '#3498db'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });

            document.getElementById('chartsContainer').style.display = 'grid';
        }

        function renderPersonaCards(distribution, insights) {
            const personas = [
                { name: 'Power User', icon: '⚡', class: 'power-user' },
                { name: 'Premium Subscriber', icon: '👑', class: 'premium-subscriber' },
                { name: 'Trial User', icon: '🎯', class: 'trial-user' },
                { name: 'Occasional User', icon: '👤', class: 'occasional-user' },
                { name: 'At-Risk User', icon: '⚠️', class: 'at-risk-user' },
                { name: 'Document Specialist', icon: '📋', class: 'document-specialist' }
            ];

            const personaHTML = personas.map(persona => {
                const count = distribution.personaDistribution[persona.name] || 0;
                const percentage = distribution.personaPercentages[persona.name] || '0.0';
                
                return `
                    <div class="persona-card">
                        <div class="persona-header">
                            <div class="persona-icon ${persona.class}">${persona.icon}</div>
                            <div>
                                <div class="persona-name">${persona.name}</div>
                                <div class="persona-count">${count} users (${percentage}%)</div>
                            </div>
                        </div>
                        <div class="persona-metrics">
                            <div class="metric">
                                <div class="metric-value">${count}</div>
                                <div class="metric-label">Total Users</div>
                            </div>
                            <div class="metric">
                                <div class="metric-value">${percentage}%</div>
                                <div class="metric-label">Percentage</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('personaGrid').innerHTML = personaHTML;
            document.getElementById('personaGrid').style.display = 'grid';
        }

        function renderInsights(insights) {
            const insightsHTML = insights.recommendations.map(rec => {
                const priorityClass = rec.priority === 'high' ? 'insight-high' : 
                                   rec.priority === 'medium' ? 'insight-medium' : 'insight-positive';
                
                return `
                    <div class="insight-item ${priorityClass}">
                        <strong>${rec.segment.toUpperCase()}</strong>: ${rec.action}
                        <br><small>Expected Impact: ${rec.expectedImpact}</small>
                    </div>
                `;
            }).join('');

            document.getElementById('insightsList').innerHTML = insightsHTML;
            document.getElementById('insightsContainer').style.display = 'block';
        }

        function showIndividualAnalysis(analysis) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.8); z-index: 1000;
                display: flex; align-items: center; justify-content: center;
                padding: 20px;
            `;
            
            modal.innerHTML = `
                <div style="background: white; padding: 30px; border-radius: 15px; max-width: 800px; max-height: 80vh; overflow-y: auto;">
                    <h2>📊 Individual User Analysis</h2>
                    <p><strong>Phone:</strong> ${analysis.phoneNumber}</p>
                    <p><strong>Persona:</strong> ${analysis.primaryPersona.name}</p>
                    
                    <h3>Behavior Metrics</h3>
                    <ul>
                        <li>Total Documents: ${analysis.behaviorMetrics.totalDocuments}</li>
                        <li>Documents (30 days): ${analysis.behaviorMetrics.documentsLast30Days}</li>
                        <li>Total Spent: €${analysis.behaviorMetrics.totalSpent}</li>
                        <li>Engagement Score: ${analysis.engagementLevel.score}/100</li>
                    </ul>
                    
                    <h3>Insights</h3>
                    ${analysis.insights.map(insight => `
                        <div style="padding: 10px; margin: 5px 0; background: #f8f9fa; border-radius: 5px;">
                            ${insight.insight}
                        </div>
                    `).join('')}
                    
                    <button onclick="this.parentElement.parentElement.remove()" 
                            style="background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px;">
                        Close
                    </button>
                </div>
            `;
            
            document.body.appendChild(modal);
        }

        function exportData() {
            if (!dashboardData) {
                alert('No data to export. Please refresh the dashboard first.');
                return;
            }
            
            const exportData = {
                timestamp: new Date().toISOString(),
                ...dashboardData
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `persona-analysis-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showLoading() {
            document.getElementById('statsGrid').innerHTML = '<div class="loading">Loading dashboard data...</div>';
            document.getElementById('chartsContainer').style.display = 'none';
            document.getElementById('personaGrid').style.display = 'none';
            document.getElementById('insightsContainer').style.display = 'none';
        }

        function hideLoading() {
            // Content will be shown by render functions
        }

        function showError(message) {
            document.getElementById('statsGrid').innerHTML = `<div class="loading" style="color: #e74c3c;">Error: ${message}</div>`;
        }
    </script>
</body>
</html>
