
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MenuFlows - Digital Restaurant Experience Platform</title>
    <meta name="description" content="Empower your restaurant with digital ordering that preserves hospitality. QR code ordering, waiter handshake system, and real-time kitchen display." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#c21e3a",
              "background-light": "#f8f6f6",
              "background-dark": "#201214",
              "surface-dark": "#2d1a1d", 
              "surface-light": "#ffffff",
              "text-secondary": "#b79ea2",
              "dashboard-bg": "#211114",
              "dashboard-surface": "#2d1a1e",
              "admin-bg": "#0f172a",
              "admin-surface": "#1e293b",
            },
            fontFamily: {
              "display": ["Plus Jakarta Sans", "sans-serif"],
              "sans": ["Plus Jakarta Sans", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "1rem", 
              "md": "1.5rem", 
              "lg": "2rem", 
              "xl": "3rem", 
              "full": "9999px"
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-soft': 'pulseSoft 2s infinite',
              'bounce-subtle': 'bounceSubtle 0.5s ease-in-out',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'scale(0.98)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.7' },
              },
              bounceSubtle: {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.15)' },
              }
            }
          },
        },
      }
    </script>
    
    <!-- Global Styles -->
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #170e10; 
      }
      * {
        -webkit-tap-highlight-color: transparent;
      }
      .view-transition {
        animation: fadeIn 0.4s ease-out;
      }
      
      /* Emergency fallback styles */
      .emergency-fallback {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #241619;
        color: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-family: Arial, sans-serif;
        z-index: 9999;
        display: none;
      }
    </style>
    
    <!-- React Import Maps -->
    <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
      }
    }
    </script>
    
    <!-- Error Detection -->
    <script>
      console.log('🚀 MenuFlows HTML loaded');
      
      // Show fallback if React doesn't load within 10 seconds
      setTimeout(function() {
        const root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          console.error('❌ React app failed to load');
          document.getElementById('emergency-fallback').style.display = 'block';
        }
      }, 10000);
      
      // Global error handler
      window.addEventListener('error', function(e) {
        console.error('❌ Global error:', e.error);
        document.getElementById('emergency-fallback').style.display = 'block';
      });
      
      // Unhandled promise rejection handler
      window.addEventListener('unhandledrejection', function(e) {
        console.error('❌ Unhandled promise rejection:', e.reason);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Emergency Fallback -->
    <div id="emergency-fallback" class="emergency-fallback">
      <h2>🚨 MenuFlows Loading Issue</h2>
      <p>The React app failed to initialize.</p>
      <p><strong>Debug Info:</strong></p>
      <p>URL: <span id="debug-url"></span></p>
      <p>Time: <span id="debug-time"></span></p>
      <button onclick="window.location.reload()" style="background: #c21e3a; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
        🔄 Reload Page
      </button>
      <br><br>
      <a href="/simple.html" style="color: #c21e3a;">📋 Simple Test</a> |
      <a href="/debug.html" style="color: #c21e3a;">🔍 Debug Page</a>
    </div>
    
    <script>
      // Update debug info
      document.getElementById('debug-url').textContent = window.location.href;
      document.getElementById('debug-time').textContent = new Date().toLocaleString();
    </script>
    
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
